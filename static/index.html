<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Kruzchl</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="perm-overlay" id="permOverlay" role="dialog" aria-modal="true" aria-labelledby="permTitle" aria-describedby="permDesc">
      <div class="perm-card">
        <h1 class="perm-title" id="permTitle">Доступ к камере и микрофону</h1>
        <p class="perm-desc" id="permDesc">
          Сайту нужно разрешение браузера, чтобы записывать круглое видео и звук. Данные не отправляются, пока вы не закончите запись и не загрузите кружок.
        </p>
        <button type="button" class="perm-btn" id="btnAllowMedia">Разрешить доступ к камере и микрофону</button>
        <p class="perm-hint" id="permError" hidden></p>
      </div>
    </div>

    <div class="app">
      <header class="top">
        <p class="hint" id="quotaLine">Загрузка…</p>
      </header>

      <main class="stage">
        <p class="hint" id="statsLine"></p>
        <div class="circle-wrap" id="circleWrap">
          <svg class="record-ring-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="record-ring-track" cx="50" cy="50" r="46.75" pathLength="100" />
            <circle
              class="record-ring-progress"
              id="recordRingProgress"
              cx="50"
              cy="50"
              r="46.75"
              pathLength="100"
              transform="rotate(-90 50 50)"
            />
          </svg>
          <div class="circle-frame" id="circleFrame">
            <video id="video" class="circle-video" playsinline autoplay muted></video>
            <span class="record-timer" id="recordTimerText" hidden></span>
          </div>
        </div>
        <p class="status" id="statusLine" aria-live="polite"></p>
      </main>

      <footer class="controls">
        <button type="button" class="btn-icon" id="btnFlip" aria-label="Перевернуть камеру" title="Перевернуть камеру">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M20 10c0-4.4-3.6-8-8-8s-8 3.6-8 8" />
            <path d="M4 14c0 4.4 3.6 8 8 8s8-3.6 8-8" />
            <path d="M4 10h4l-3-3-3 3" />
            <path d="M20 14h-4l3 3 3-3" />
          </svg>
        </button>

        <button type="button" class="btn-record" id="btnRecord" aria-label="Запись">
          <span class="btn-record-inner" id="recordDot"></span>
        </button>

        <button type="button" class="btn-icon" id="btnRandom" aria-label="Случайный кружок" title="Случайный кружок">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
        </button>
      </footer>
    </div>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
